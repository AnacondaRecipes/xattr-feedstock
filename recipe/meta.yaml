{% set name = "xattr" %}
{% set version = "1.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 30439fabd7de0787b27e9a6e1d569c5959854cb322f64ce7380fedbfa5035036

build:
  number: 0
  entry_points:
    - xattr = xattr.tool:main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<39]
  skip: true  # [win]

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
  host:
    - python
    - pip
    - cffi >=1.16.0
    - setuptools >=77.0.3
    - wheel
  run:
    - python
    - cffi >=1.16.0

test:
  source_files:
    - tests
  imports:
    - xattr
  commands:
    - pip check
    - xattr --help
    - pytest -v tests
  requires:
    - pip
    - pytest

about:
  home: https://github.com/xattr/xattr
  license_file: LICENSE.txt
  license: MIT
  license_family: MIT
  summary: Python wrapper for extended filesystem attributes
  description: xattr is a Python wrapper for extended filesystem attributes.
  dev_url: https://github.com/xattr/xattr
  doc_url: https://github.com/xattr/xattr

extra:
  recipe-maintainers:
    - jonashaag
    - pmlandwehr
